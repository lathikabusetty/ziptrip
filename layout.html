<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question 5 CSS Layout</title>
    <link rel="stylesheet" href="layout.css">
</head>
<body>
    <h2>Method 1: Flexbox</h2>
    <div id="container" class="container-flex">
        <div class="left fixed box">Left (Flex)</div>
        <div class="middle expanding box">Middle (Flex)</div>
        <div class="right fixed box">Right (Flex)</div>
    </div>

    <h2>Method 2: CSS Grid</h2>
    <div id="container" class="container-grid">
        <div class="left fixed box">Left (Grid)</div>
        <div class="middle expanding box">Middle (Grid)</div>
        <div class="right fixed box">Right (Grid)</div>
    </div>

    <h2>Method 3: Absolute Positioning</h2>
    <div id="container" class="container-absolute">
        <div class="left fixed box">Left (Abs)</div>
        <div class="middle expanding box">Middle (Abs)</div>
        <div class="right fixed box">Right (Abs)</div>
    </div>
</body>
</html>
